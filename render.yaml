services:
  - type: web
    name: grasp-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    disk:
      name: grasp-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: DATABASE_URL
        value: sqlite+aiosqlite:////var/data/voicetutor.db
      - key: CHROMA_PERSIST_DIR
        value: /var/data/chromadb_data
      - key: CORS_ORIGINS
        sync: false
